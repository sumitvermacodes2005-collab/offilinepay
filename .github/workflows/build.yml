name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Make gradlew executable
        run: chmod +x offlinepay/gradlew

      - name: Build Debug APK
        # We cd into the correct folder first so gradle finds settings.gradle.kts
        run: cd offlinepay && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          # The path starts from the root of the repo
          path: offlinepay/app/build/outputs/apk/debug/*.apk
